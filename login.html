<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • ShriRam Digital AI Job Hunter</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="assets/logo.png" alt="Logo" class="auth-logo" />
        <h1>ShriRam Digital AI Job Hunter</h1>
        <p>Built by ShriRam Digital</p>
      </div>

      <h2>Login</h2>
      <p class="muted">Use demo account or create new one from signup page.</p>

      <form id="loginForm" class="auth-form">
        <label>Full Name</label>
        <input type="text" id="loginName" placeholder="Enter your full name" required />

        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Enter your email" required />

        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" required />

        <button type="submit" class="btn btn-primary full">Login</button>
      </form>

      <div class="auth-links">
        <a href="signup.html">Create new account</a>
        <a href="index.html">Back to home</a>
      </div>

      <div class="footer-mini">
        Founder Atharva Chimte • 9860726613
      </div>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
