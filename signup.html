<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup • ShriRam Digital AI Job Hunter</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="assets/logo.png" alt="Logo" class="auth-logo" />
        <h1>ShriRam Digital AI Job Hunter</h1>
        <p>Built by ShriRam Digital</p>
      </div>

      <h2>Create Account</h2>
      <p class="muted">Demo signup for starter product.</p>

      <form id="signupForm" class="auth-form">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Enter your full name" required />

        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="Enter your email" required />

        <label>Mobile Number</label>
        <input type="text" id="signupMobile" placeholder="Enter mobile number" required />

        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Create password" required />

        <button type="submit" class="btn btn-primary full">Create Account</button>
      </form>

      <div class="auth-links">
        <a href="login.html">Already have account? Login</a>
        <a href="index.html">Back to home</a>
      </div>

      <div class="footer-mini">
        Founder Atharva Chimte • 9860726613
      </div>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
